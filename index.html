<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>小3ぼうけんドリル</title>
  <meta name="description" content="小学3年生向けの毎日10分で続けやすい学習サイト。算数・国語・理科・社会のクイズ、復習、親用ダッシュボードつき。" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <button class="logo" data-nav="home" aria-label="ホームへ戻る">
        <span class="logo-mark">⚡</span>
        <span>
          <strong>小3ぼうけんドリル</strong>
          <small>1日10分の学習ミッション</small>
        </span>
      </button>
      <nav class="top-nav" aria-label="メインメニュー">
        <button data-nav="home">ホーム</button>
        <button data-nav="mission">今日のミッション</button>
        <button data-nav="subjects">教科</button>
        <button data-nav="review">復習</button>
        <button data-nav="parent">おうちの人</button>
      </nav>
      <button class="hamburger" id="menuButton" aria-label="メニューを開く">☰</button>
    </header>

    <main>
      <section id="home" class="view active-view"></section>
      <section id="mission" class="view"></section>
      <section id="subjects" class="view"></section>
      <section id="quiz" class="view"></section>
      <section id="review" class="view"></section>
      <section id="parent" class="view"></section>
      <section id="lesson" class="view"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <template id="subjectCardTemplate">
    <article class="subject-card">
      <div class="subject-icon"></div>
      <div>
        <h3></h3>
        <p></p>
      </div>
      <button class="primary-button">はじめる</button>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
